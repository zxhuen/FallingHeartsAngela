<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>falling hearts for her</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg-color: #fef9e7;
            --accent-yellow: #f9e79f;
            --dark-yellow: #f4d03f;
            --text-color: #7d6608;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background-color: var(--bg-color);
            overflow: hidden;
            min-height: 100dvh;
            width: 100%;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .container {
            text-align: center;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
        }
        
        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--dark-yellow);
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
        }
        
        p {
            color: var(--text-color);
            font-weight: 600;
            opacity: 0.7;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
        }
        
        .heart {
            position: absolute;
            top: -60px;
            z-index: 5;
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            touch-action: manipulation;
            animation: fall linear forwards, sway ease-in-out infinite;
        }
        
        .heart svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.08));
            transition: transform 0.15s ease;
        }
        
        .heart:active svg {
            transform: scale(1.25);
        }
        
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(254, 249, 231, 0.6);
            backdrop-filter: blur(3px);
            display: none;
            z-index: 90;
        }
        
        #note-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            background: white;
            width: min(90%, 350px);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(244, 208, 63, 0.2);
            border: 4px solid var(--accent-yellow);
            z-index: 100;
            transition: 0.25s ease;
        }
        
        #note-display.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        
        .note-text {
            color: var(--text-color);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .close-btn {
            border: none;
            background: var(--accent-yellow);
            color: var(--text-color);
            padding: 12px 24px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .close-btn:active {
            transform: scale(0.96);
        }
        
        @keyframes fall {
            from {
                transform: translateY(-10vh);
            }
            to {
                transform: translateY(120dvh);
            }
        }
        
        @keyframes sway {
            0%,
            100% {
                translate: 0 0;
            }
            50% {
                translate: 25px 0;
            }
        }
        
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }
        
        @keyframes sideSway {
            0%,
            100% {
                margin-left: 0;
            }
            50% {
                margin-left: 50px;
            }
        }
    </style>
</head>

<body>

    <div class="sun-glow"></div>

    <div class="container">
        <h1>for Angela!</h1>
        <p>Click mo ung mga hearts hihi</p>
    </div>

    <div id="overlay"></div>
    <div id="note-display">
        <div class="note-text" id="note-content">Hello there!</div>
        <button class="close-btn" onclick="closeNote()">Close</button>
    </div>

    <script>
        const notes = [
            "You're really pretty Angela!!!",
            "Goodluck sa class mooo HAHAHA",
            "Stay pretty :3",
            "Your make up is gorjus!!",
            "don't stress yourself too much ha?",
            "You deserve all the happiness in the world!",
            "your voice sounds really good and cool :3"
        ];

        const overlay = document.getElementById('overlay');
        const noteDisplay = document.getElementById('note-display');
        const noteContent = document.getElementById('note-content');

        function createHeart() {
            const heart = document.createElement('button');

            heart.className = 'heart';

            const size = Math.random() * 30 + 45;
            const left = Math.random() * 100;
            const duration = Math.random() * 4 + 5;

            heart.style.left = `${left}%`;
            heart.style.width = `${size}px`;
            heart.style.height = `${size}px`;

            heart.style.animationDuration = `${duration}s, 3s`;

            heart.innerHTML = `
        <svg viewBox="0 0 24 24" fill="#F9E79F">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 
            2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 
            4.5 2.09C13.09 3.81 14.76 3 
            16.5 3 19.58 3 22 5.42 22 8.5c0 
            3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        `;

            heart.addEventListener('click', () => {
                showNote();

                heart.animate([{
                    transform: 'scale(1)'
                }, {
                    transform: 'scale(1.5)',
                    opacity: 1
                }, {
                    transform: 'scale(0)',
                    opacity: 0
                }], {
                    duration: 250,
                    easing: 'ease-out'
                });

                setTimeout(() => heart.remove(), 250);
            });

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        function showNote() {
            const randomNote =
                notes[Math.floor(Math.random() * notes.length)];

            noteContent.innerText = randomNote;

            overlay.style.display = 'block';
            noteDisplay.classList.add('active');
        }

        function closeNote() {
            overlay.style.display = 'none';
            noteDisplay.classList.remove('active');
        }

        overlay.addEventListener('click', closeNote);

        setInterval(createHeart, 700);

        for (let i = 0; i < 8; i++) {
            createHeart();
        }
    </script>
</body>

</html>
